<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Independent Study Guide</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- SW kill-switch: registers sw.js which immediately unregisters itself and clears all caches.
         This evicts any stale Workbox SW from previous deploys that would serve broken cached files. -->
    <script>
      if ('serviceWorker' in navigator) {
        // Register the kill-switch SW - it takes over, clears all caches, and unregisters itself
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function() {});
        // Also eagerly clear caches in case we already have the new index.html without old SW
        if (window.caches) {
          caches.keys().then(function(keys) {
            keys.forEach(function(key) { caches.delete(key); });
          });
        }
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
