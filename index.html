  <body>
    <!-- SW kill-switch: registers sw.js which immediately unregisters itself and clears all caches.
         This evicts any stale Workbox SW from previous deploys that would serve broken cached files. -->
    <script>
      // Chunk-load error recovery: if a JS module fails to load (stale SW cache),
      // clear all caches and reload once to fetch fresh assets from the network.
      window.addEventListener('error', function(e) {
        var src = e.filename || (e.target && e.target.src) || '';
        if (src.indexOf('/assets/') !== -1 || (e.message && e.message.indexOf('Failed to fetch') !== -1)) {
          var reloadKey = 'chunk_reload_' + location.pathname;
          if (!sessionStorage.getItem(reloadKey)) {
            sessionStorage.setItem(reloadKey, '1');
            if (window.caches) {
              caches.keys().then(function(keys) {
                Promise.all(keys.map(function(k) { return caches.delete(k); })).then(function() {
                  location.reload(true);
                });
              });
            } else {
              location.reload(true);
            }
          }
        }
      }, true);

      if ('serviceWorker' in navigator) {
        // Register the kill-switch SW - it takes over, clears all caches, and unregisters itself
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function() {});
        // Also eagerly clear caches in case we already have the new index.html without old SW
        if (window.caches) {
          caches.keys().then(function(keys) {
            keys.forEach(function(key) { caches.delete(key); });
          });
        }
        // Listen for the kill-switch SW postMessage and reload once per session
        navigator.serviceWorker.addEventListener('message', function(event) {
          if (event.data && event.data.type === 'SW_KILL_SWITCH_ACTIVATED') {
            var reloadKey = 'sw_kill_reload_' + location.pathname;
            if (!sessionStorage.getItem(reloadKey)) {
              sessionStorage.setItem(reloadKey, '1');
              location.reload(true);
            }
          }
        });
      }
    </script>

  </body>
