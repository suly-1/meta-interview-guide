name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build standalone static site
        run: pnpm build:standalone:static
        env:
          VITE_APP_TITLE: "Meta IC6/IC7 Interview Guide"
          VITE_APP_ID: "placeholder"
          VITE_OAUTH_PORTAL_URL: "https://manus.im"
          VITE_FRONTEND_FORGE_API_KEY: "placeholder"
          VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"
          VITE_ANALYTICS_ENDPOINT: ""
          VITE_ANALYTICS_WEBSITE_ID: ""

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/standalone
          publish_branch: gh-pages
          commit_message: "Deploy [skip ci]"
          force_orphan: false
