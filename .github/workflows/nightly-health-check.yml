name: Nightly Health Check

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest suite
        run: pnpm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}

  build-check:
    name: TypeScript + Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm exec tsc --noEmit

      - name: Build (full)
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}

  smoke-tests:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, build-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start dev server and run smoke tests
        run: |
          pnpm dev &
          sleep 8
          pnpm exec ts-node --esm scripts/smoke-test.ts || npx tsx scripts/smoke-test.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}

  live-site-check:
    name: Live Site Availability Check
    runs-on: ubuntu-latest
    steps:
      - name: Check metaengguide.pro
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://metaengguide.pro)
          echo "metaengguide.pro HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::metaengguide.pro returned HTTP $STATUS"
            exit 1
          fi

      - name: Check metaguide.blog
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://www.metaguide.blog)
          echo "metaguide.blog HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::www.metaguide.blog returned HTTP $STATUS"
            exit 1
          fi

      - name: Check critical API endpoint (metaguide.blog)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://www.metaguide.blog/api/trpc/system.health)
          echo "API health endpoint status: $STATUS"
          # 200 or 404 are both acceptable (404 means route not defined but server is up)
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "::error::API health check failed with HTTP $STATUS"
            exit 1
          fi

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, build-check, smoke-tests, live-site-check]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "One or more nightly health checks failed."
          echo "Review the workflow run at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Extend here with Slack/email webhook if desired:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Nightly health check FAILED: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
